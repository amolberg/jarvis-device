<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="monospace" font-size="13">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <circle cx="4" cy="4" r="3" fill="#4a9eff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" fill="#1a1a2e"/>
  <rect x="10" y="10" width="880" height="620" rx="8" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold" font-family="sans-serif">JARVIS Device — Wiring Diagram</text>

  <!-- ========== ESP32-S3 DevKitC-1 ========== -->
  <rect x="40" y="70" width="220" height="320" rx="8" fill="#0f3460" stroke="#4a9eff" stroke-width="2"/>
  <text x="150" y="95" text-anchor="middle" fill="#4a9eff" font-size="15" font-weight="bold" font-family="sans-serif">ESP32-S3-DevKitC-1</text>
  <text x="150" y="112" text-anchor="middle" fill="#888" font-size="11">N8R8 (recommended)</text>

  <!-- Pin labels -->
  <g fill="#ccc" font-size="10">
    <!-- Left side pins -->
    <text x="48" y="132">3V3</text>
    <text x="48" y="150">GND</text>
    <text x="48" y="168">GPIO4  → SD_DATA</text>
    <text x="48" y="186">GPIO5  → SCK</text>
    <text x="48" y="204">GPIO6  → WS</text>
    <text x="48" y="222">GPIO1  → SDA</text>
    <text x="48" y="240">GPIO2  → SCL</text>
    <text x="48" y="258">GPIO48 → LED_DIN</text>
    <text x="48" y="276">EN</text>
    <text x="48" y="294">GND</text>

    <!-- Right side pins -->
    <text x="240" y="132">GPIO10</text>
    <text x="240" y="150">GPIO11</text>
    <text x="240" y="168">3V3</text>
    <text x="240" y="186">GND</text>
    <text x="240" y="204">USB-D+</text>
    <text x="240" y="222">USB-D-</text>
    <text x="240" y="240">GND</text>
    <text x="240" y="258">VBUS</text>
    <text x="240" y="276">5V</text>
    <text x="240" y="294">GND</text>
  </g>

  <!-- Pin circles left -->
  <g fill="#ffd700" stroke="#b8860b" stroke-width="1">
    <circle cx="60" cy="127" r="4"/><circle cx="60" cy="145" r="4"/>
    <circle cx="60" cy="163" r="4"/><circle cx="60" cy="181" r="4"/>
    <circle cx="60" cy="199" r="4"/><circle cx="60" cy="217" r="4"/>
    <circle cx="60" cy="235" r="4"/><circle cx="60" cy="253" r="4"/>
    <circle cx="60" cy="271" r="4"/><circle cx="60" cy="289" r="4"/>
  </g>
  <!-- Pin circles right -->
  <g fill="#ffd700" stroke="#b8860b" stroke-width="1">
    <circle cx="240" cy="127" r="4"/><circle cx="240" cy="145" r="4"/>
    <circle cx="240" cy="163" r="4"/><circle cx="240" cy="181" r="4"/>
    <circle cx="240" cy="199" r="4"/><circle cx="240" cy="217" r="4"/>
    <circle cx="240" cy="235" r="4"/><circle cx="240" cy="253" r="4"/>
    <circle cx="240" cy="271" r="4"/><circle cx="240" cy="289" r="4"/>
  </g>

  <!-- ========== INMP441 Microphone ========== -->
  <rect x="300" y="100" width="180" height="200" rx="8" fill="#1a3a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="390" y="122" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold" font-family="sans-serif">INMP441</text>
  <text x="390" y="138" text-anchor="middle" fill="#888" font-size="11">I2S Digital Microphone</text>

  <g fill="#ccc" font-size="11">
    <text x="308" y="162">VDD   ──── 3.3V</text>
    <text x="308" y="182">GND   ──── GND</text>
    <text x="308" y="202">SD    ──── GPIO4</text>
    <text x="308" y="222">SCK   ──── GPIO5</text>
    <text x="308" y="242">WS    ──── GPIO6</text>
    <text x="308" y="262">L/R   ──── GND</text>
  </g>
  <g fill="#4ade80">
    <circle cx="300" cy="157" r="4"/><circle cx="300" cy="177" r="4"/>
    <circle cx="300" cy="197" r="4"/><circle cx="300" cy="217" r="4"/>
    <circle cx="300" cy="237" r="4"/><circle cx="300" cy="257" r="4"/>
  </g>

  <!-- ========== WS2812B LED Ring ========== -->
  <rect x="300" y="310" width="180" height="120" rx="8" fill="#2a1a3a" stroke="#c084fc" stroke-width="2"/>
  <text x="390" y="332" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="bold" font-family="sans-serif">WS2812B LED Ring (24)</text>
  <text x="390" y="348" text-anchor="middle" fill="#888" font-size="11">5V RGB Addressable LEDs</text>

  <g fill="#ccc" font-size="11">
    <text x="308" y="372">5V    ──── USB 5V (or 5V supply)</text>
    <text x="308" y="394">DIN   ──── GPIO48</text>
    <text x="308" y="416">GND   ──── GND</text>
  </g>
  <g fill="#c084fc">
    <circle cx="300" cy="367" r="4"/><circle cx="300" cy="389" r="4"/>
    <circle cx="300" cy="411" r="4"/>
  </g>
  <text x="308" y="430" fill="#ff6b6b" font-size="10">⚠ Add 100µF cap across 5V/GND</text>

  <!-- ========== BME280 (Optional) ========== -->
  <rect x="300" y="440" width="180" height="120" rx="8" fill="#2a2a1a" stroke="#fbbf24" stroke-width="2"/>
  <text x="390" y="462" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="bold" font-family="sans-serif">BME280 (Optional)</text>
  <text x="390" y="478" text-anchor="middle" fill="#888" font-size="11">I2C Temp/Humidity/Pressure</text>

  <g fill="#ccc" font-size="11">
    <text x="308" y="502">VCC   ──── 3.3V</text>
    <text x="308" y="524">GND   ──── GND</text>
    <text x="308" y="546">SDA   ──── GPIO1</text>
  </g>
  <g fill="#fbbf24">
    <circle cx="300" cy="497" r="4"/><circle cx="300" cy="519" r="4"/>
    <circle cx="300" cy="541" r="4"/>
  </g>

  <!-- ========== WIRES ========== -->
  <!-- 3.3V bus (red) -->
  <path d="M 64 127 C 120 127, 130 127, 140 127 L 300 127" stroke="#ff4444" stroke-width="2.5" fill="none" marker-end="url(#dot)"/>
  <text x="200" y="120" fill="#ff6666" font-size="10">3.3V (red)</text>

  <!-- GND bus (black) -->
  <path d="M 64 145 C 100 145, 130 145, 140 145 L 300 145" stroke="#666" stroke-width="2.5" fill="none"/>
  <path d="M 64 289 C 100 289, 130 289, 140 289 L 300 177" stroke="#666" stroke-width="2.5" fill="none"/>
  <path d="M 64 271 C 80 271, 100 271, 120 271 L 120 411 L 300 411" stroke="#666" stroke-width="2.5" fill="none"/>
  <path d="M 64 145 L 64 411 C 64 411, 100 411, 140 411 L 300 177" stroke="#666" stroke-width="2.5" fill="none" opacity="0"/>
  <text x="200" y="460" fill="#999" font-size="10">GND (black)</text>

  <!-- GPIO4 → SD -->
  <path d="M 64 163 C 120 163, 130 197, 140 197 L 300 197" stroke="#4a9eff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="190" y="176" fill="#6ab0ff" font-size="9">GPIO4 → SD</text>

  <!-- GPIO5 → SCK -->
  <path d="M 64 181 C 120 181, 130 217, 140 217 L 300 217" stroke="#4a9eff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="190" y="195" fill="#6ab0ff" font-size="9">GPIO5 → SCK</text>

  <!-- GPIO6 → WS -->
  <path d="M 64 199 C 120 199, 130 237, 140 237 L 300 237" stroke="#4a9eff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="190" y="215" fill="#6ab0ff" font-size="9">GPIO6 → WS</text>

  <!-- GPIO48 → DIN -->
  <path d="M 64 253 C 120 253, 130 389, 140 389 L 300 389" stroke="#ff8c00" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="200" y="320" fill="#ffa500" font-size="9">GPIO48 → DIN</text>

  <!-- GPIO1 → SDA (BME280) -->
  <path d="M 64 217 C 120 217, 130 546, 140 546 L 300 546" stroke="#4a9eff" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="200" y="390" fill="#6ab0ff" font-size="9">GPIO1 → SDA</text>

  <!-- 5V → LED ring -->
  <path d="M 248 271 C 280 271, 290 367, 300 367" stroke="#ff4444" stroke-width="2" fill="none" marker-end="url(#dot)"/>

  <!-- ========== Legend ========== -->
  <rect x="530" y="80" width="340" height="490" rx="8" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="700" y="108" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="bold" font-family="sans-serif">Connection Legend</text>

  <g font-size="12" fill="#ccc">
    <line x1="545" y1="135" x2="575" y2="135" stroke="#ff4444" stroke-width="2.5"/><text x="585" y="139">3.3V Power Rail (red wire)</text>
    <line x1="545" y1="160" x2="575" y2="160" stroke="#666" stroke-width="2.5"/><text x="585" y="164">Ground (black wire)</text>
    <line x1="545" y1="185" x2="575" y2="185" stroke="#4a9eff" stroke-width="2"/><text x="585" y="189">I2S Data (blue wire)</text>
    <line x1="545" y1="210" x2="575" y2="210" stroke="#ff8c00" stroke-width="2"/><text x="585" y="214">LED Data (orange wire)</text>
    <line x1="545" y1="235" x2="575" y2="235" stroke="#4ade80" stroke-width="2"/><text x="585" y="239">I2C Data (green wire)</text>
  </g>

  <text x="545" y="272" fill="#888" font-size="11">─────────────────────────</text>
  <text x="545" y="295" fill="#e0e0e0" font-size="13" font-weight="bold">Power Requirements</text>
  <text x="545" y="318" fill="#ccc" font-size="11">• ESP32-S3: 3.3V @ ~500mA peak</text>
  <text x="545" y="336" fill="#ccc" font-size="11">• INMP441: 3.3V @ ~2mA</text>
  <text x="545" y="354" fill="#ccc" font-size="11">• WS2812B (24 LEDs): 5V @ ~1.4A max</text>
  <text x="545" y="372" fill="#ccc" font-size="11">• BME280: 3.3V @ ~3mA</text>
  <text x="545" y="394" fill="#fbbf24" font-size="11">⚡ Use USB 5V for LED ring, LDO for 3.3V</text>
  <text x="545" y="412" fill="#ccc" font-size="11">⚡ Add 100µF cap across LED ring 5V/GND</text>

  <text x="545" y="440" fill="#888" font-size="11">─────────────────────────</text>
  <text x="545" y="463" fill="#e0e0e0" font-size="13" font-weight="bold">Pin Map Summary</text>
  <g fill="#bbb" font-size="10" font-family="monospace">
    <text x="545" y="486">GPIO4  → I2S SD (INMP441)</text>
    <text x="545" y="503">GPIO5  → I2S SCK (INMP441)</text>
    <text x="545" y="520">GPIO6  → I2S WS  (INMP441)</text>
    <text x="545" y="537">GPIO1  → I2C SDA (BME280)</text>
    <text x="545" y="554">GPIO2  → I2C SCL (BME280)</text>
    <text x="545" y="571">GPIO48 → LED DIN  (WS2812B)</text>
  </g>

  <text x="545" y="598" fill="#ff6b6b" font-size="10">⚠ Double-check voltage levels before powering!</text>
  <text x="545" y="615" fill="#888" font-size="10">ESP32-S3 is 3.3V logic only. No 5V tolerant pins.</text>
  <text x="545" y="632" fill="#888" font-size="10">LED ring MUST be powered from 5V rail, NOT 3.3V.</text>

  <!-- Version -->
  <text x="880" y="635" text-anchor="end" fill="#555" font-size="9">jarvis-device v1.0 | amolberg 2026</text>
</svg>
