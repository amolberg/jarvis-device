[platformio]
default_envs = esp32-s3-devkitc-1

[env]
framework = espidf
platform = espressif32@6.4.0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

[env:esp32-s3-devkitc-1]
board = esp32-s3-devkitc-1
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_qio
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=16384
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ESPTOOLPY_FLASHSIZE_8MB=1
    -DCONFIG_ESP32S3_DATA_CACHE_64KB=1
    -DCONFIG_ESP32S3_INSTRUCTION_CACHE_64KB=1
    -DCONFIG_ESP_HTTP_CLIENT_ENABLE_LARGE_RESPONSE=1
lib_deps =
    https://github.com/plietar/esphome-esp32-i2s-mic
    ; MQTT client
    https://github.com/micropython/paho-mqtt
    ; JSON parsing
    https://github.com/bblanchon/ArduinoJson.git
    ; LED animations
    FastLED@3.6.0
    ; HTTP client (included in ESP-IDF)
    ; NVS settings (built-in)
    ; OTA updates
upload_speed = 921600
```

I'm setting up the ESP32-S3 configuration with 8MB flash and partitioned for a large app, pulling in external libraries for I2S microphone input, MQTT messaging, JSON parsing, and LED control, with OTA update support enabled.

Now I'm creating the main header file that defines the device configuration—I'm setting up the I2S pins for the INMP441 microphone, WS2812B LED ring on GPIO 48, and the BME280 sensor on I2C, along with audio parameters like 16kHz mono PCM. The state machine tracks the device's mode (idle, listening, processing, speaking, error), and I'm defining the MQTT topics for receiving commands from JARVIS and streaming audio data.

For audio streaming, I'm considering whether to use the existing HTTP streaming endpoint or switch to WebSocket for bidirectional communication. The current JARVIS Core API expects JSON frames with audio data, so I could adapt that approach. Let me look at how the Android voice service sends audio to see if I can align with that pattern.
